services:


  mcp-pdf-reader:
      build: 
        context: ${MCP_PDF_READER_PATH}
      ports:
        - "8000:8000"
      environment:
        - PYTHONUNBUFFERED=1
        - HOST=0.0.0.0          
        - UVICORN_HOST=0.0.0.0  
        - PORT=8000
      volumes:
        - ${DOCS_PATH}:/mnt/documents
      restart: unless-stopped

  mcp-filesystem:
    build:
      context: ./mcp-filesystem
    ports:
      - "8001:8001"
    environment:
      - ALLOWED_DIRECTORIES=["/mnt/documents"]
    volumes:
      - ${DOCS_PATH}:/mnt/documents
    restart: unless-stopped

  mcp-playwright:
    build:
      context: ./mcp-playwright
    ports:
      - "8002:8002"
    shm_size: '1gb'
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mcp-pdf-reader
      - mcp-filesystem
      - mcp-playwright
    restart: unless-stopped